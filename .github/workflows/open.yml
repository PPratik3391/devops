name: Open URL Locally

on:
  workflow_dispatch:
   inputs:
      issueKey:
        description: "Jira issue key, e.g., ABC-123"
        #required: true
        type: string
jobs:
  open:
    runs-on: self-hosted         
    env: 
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
    steps:
      - name: Validate inputs (PowerShell)
        shell: powershell
        env:
          ISSUE_KEY: ${{ github.event.inputs.issueKey }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ISSUE_KEY)) {
            Write-Host "issueKey is required"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:JIRA_BASE_URL)) {
            Write-Host "Set JIRA_BASE_URL (repo secret) to your Jira base URL, e.g., https://your-domain.atlassian.net"
            exit 1
          }
          Write-Host "Inputs OK. ISSUE_KEY=$($env:ISSUE_KEY)  JIRA_BASE_URL=$($env:JIRA_BASE_URL)"

      - name: Compose URL
        id: makeurl
        shell: powershell
        env:
          ISSUE_KEY: ${{ github.event.inputs.issueKey }}
        run: |
          $url = "$env:JIRA_BASE_URL/browse/$env:ISSUE_KEY"
          Write-Host "Opening: $url"
          "url=$url" >> $env:GITHUB_OUTPUT


      # ---------- Windows ----------
      - name: Open in Chrome (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
           #Start-Process "chrome.exe" -ArgumentList "https://wastemanagement.atlassian.net/"
           $url = "${{ steps.makeurl.outputs.url }}"
           Start-Process "chrome.exe" -ArgumentList @("--new-window", $url)
           Start-Sleep -Seconds 9
