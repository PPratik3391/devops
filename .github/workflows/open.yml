name: Open URL Locally

on:
  workflow_dispatch:

jobs:
  open-url:
    runs-on: self-hosted
    steps:
      - name: Open URL in Chrome
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File "C:\automation\open_and_fill.ps1"          
          Start-Sleep -Seconds 9
         
