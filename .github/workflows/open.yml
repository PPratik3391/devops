name: Open URL Locally

on:
  workflow_dispatch:
   inputs:
      issueKey:
        description: "Jira issue key, e.g., ABC-123"
        required: true
        type: string
jobs:
  open:
    runs-on: self-hosted       
    env:
      # Set your Jira base URL here or store in secrets
      JIRA_BASE_URL: https://wastemanagement.atlassian.net/

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          if [ -z "${{ github.event.inputs.issueKey }}" ]; then
            echo "issueKey is required" && exit 1
            echo $JIRA_BASE_URL
          fi
          if [ -z "$JIRA_BASE_URL" ]; then
            echo "Set JIRA_BASE_URL (repo secret) to your Jira base URL" && exit 1
          fi

      - name: Compose URL
        id: makeurl
        shell: bash
        run: |
          ISSUE="${{ github.event.inputs.issueKey }}"
          URL="${JIRA_BASE_URL}/browse/${ISSUE}"
          echo "Opening: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # ---------- Windows ----------
      - name: Open in Chrome (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
           #Start-Process "chrome.exe" -ArgumentList "https://wastemanagement.atlassian.net/"
           $url = "${{ steps.makeurl.outputs.url }}"
           Start-Process "chrome.exe" -ArgumentList @("--new-window", $url)
           Start-Sleep -Seconds 9
