name: E2E - Select dropdowns and start (Playwright)

on:
  workflow_dispatch:
    inputs:
      testUrl:
        description: "Target page URL"
        required: true
        default: "https://webportal.wm.com/"

jobs:
  e2e:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright and browsers
        run: npx playwright install --with-deps

      - name: Run automation
        env:
          TEST_URL: ${{ github.event.inputs.testUrl }}
        run: node ./scripts/automate.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/**
